apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring-stack
    app.kubernetes.io/part-of: floci-jenkins-helm-argocd-gitops
spec:
  project: monitoring

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.3
    helm:
      releaseName: monitoring
      values: |
        fullnameOverride: monitoring

        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
          defaultDashboardsEnabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.127.0.0.1.nip.io
            path: /
            pathType: Prefix

        prometheus:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.127.0.0.1.nip.io
            paths:
              - /
            pathType: Prefix
          prometheusSpec:
            retention: 7d
            scrapeInterval: 30s
            evaluationInterval: 30s
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorNamespaceSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            probeNamespaceSelectorNilUsesHelmValues: false

        alertmanager:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - alertmanager.127.0.0.1.nip.io
            paths:
              - /
            pathType: Prefix

          config:
            global:
              resolve_timeout: 5m
              slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url

            route:
              receiver: skm-alerts-slack
              group_by:
                - namespace
                - alertname
                - severity
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 2h
              routes:
                - receiver: skm-alerts-slack
                  matchers:
                    - severity =~ "warning|critical|info"

            receivers:
              - name: skm-alerts-slack
                slack_configs:
                  - channel: "#skm_alerts"
                    send_resolved: true
                    title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: |-
                      *Severity:* {{ .CommonLabels.severity }}
                      *Namespace:* {{ .CommonLabels.namespace }}
                      *Summary:* {{ .CommonAnnotations.summary }}
                      *Description:* {{ .CommonAnnotations.description }}

          alertmanagerSpec:
            retention: 120h
            secrets:
              - alertmanager-slack-webhook

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        kubeEtcd:
          enabled: false

        defaultRules:
          create: true
          rules:
            etcd: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeControllerManager: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
