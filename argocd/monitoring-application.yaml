apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring-stack
    app.kubernetes.io/part-of: floci-jenkins-helm-argocd-gitops
spec:
  project: monitoring

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.3
    helm:
      releaseName: monitoring
      values: |
        fullnameOverride: monitoring

        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
          defaultDashboardsEnabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.127.0.0.1.nip.io
            path: /
            pathType: Prefix

        prometheus:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - prometheus.127.0.0.1.nip.io
            paths:
              - /
            pathType: Prefix
          prometheusSpec:
            retention: 7d
            scrapeInterval: 30s
            evaluationInterval: 30s
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorNamespaceSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            probeNamespaceSelectorNilUsesHelmValues: false

        alertmanager:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - alertmanager.127.0.0.1.nip.io
            paths:
              - /
            pathType: Prefix

          config:
            global:
              resolve_timeout: 5m
              slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url

            route:
              receiver: skm-alerts-slack
              group_by:
                - namespace
                - alertname
                - severity
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 2h
              routes:
                - receiver: skm-alerts-slack
                  matchers:
                    - severity =~ "warning|critical|info"

            receivers:
              - name: skm-alerts-slack
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
                    channel: "#skm_alerts"
                    username: "Kubernetes Alertmanager"
                    icon_emoji: ":rotating_light:"
                    send_resolved: true
                    link_names: true
                    mrkdwn_in:
                      - pretext
                      - text
                      - fields
                    color: '{{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.severity "critical" }}danger{{ else if eq .CommonLabels.severity "warning" }}warning{{ else }}#439FE0{{ end }}'
                    title: '{{ if eq .Status "firing" }}🚨 Kubernetes Alert Firing{{ else }}✅ Kubernetes Alert Resolved{{ end }}'
                    title_link: "http://alertmanager.127.0.0.1.nip.io"
                    pretext: '{{ if eq .Status "firing" }}*Production-style Kubernetes alert detected in local GitOps platform*{{ else }}*Kubernetes alert recovered in local GitOps platform*{{ end }}'
                    text: |-
                      *{{ .CommonLabels.alertname }}* is `{{ .Status | toUpper }}`.

                      {{ .CommonAnnotations.summary }}

                      _{{ .CommonAnnotations.description }}_
                    fallback: '{{ .CommonLabels.alertname }} - {{ .Status }} - {{ .CommonLabels.severity }}'
                    footer: "Prometheus Alertmanager • Jenkins + Argo CD + Helm + kind"
                    fields:
                      - title: "Environment"
                        value: "local-kind"
                        short: true
                      - title: "Severity"
                        value: "`{{ .CommonLabels.severity }}`"
                        short: true
                      - title: "Namespace"
                        value: "`{{ .CommonLabels.namespace }}`"
                        short: true
                      - title: "Service"
                        value: "`{{ .CommonLabels.service }}`"
                        short: true
                      - title: "Team"
                        value: "`{{ .CommonLabels.team }}`"
                        short: true
                      - title: "Status"
                        value: "`{{ .Status | toUpper }}`"
                        short: true
                    actions:
                      - type: button
                        text: "Open Grafana"
                        url: "http://grafana.127.0.0.1.nip.io"
                      - type: button
                        text: "Open Prometheus"
                        url: "http://prometheus.127.0.0.1.nip.io/alerts"
                      - type: button
                        text: "Open Alertmanager"
                        url: "http://alertmanager.127.0.0.1.nip.io"

          alertmanagerSpec:
            retention: 120h
            secrets:
              - alertmanager-slack-webhook

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        kubeEtcd:
          enabled: false

        defaultRules:
          create: true
          rules:
            etcd: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeControllerManager: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
