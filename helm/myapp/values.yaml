replicaCount: 2
image:
  repository: host.docker.internal:5100/floci-cicd/gitops-demo-app
  tag: build-24-c68d7c3
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
  name: myapp
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress:
  enabled: true
  className: nginx
  host: myapp.127.0.0.1.nip.io
  path: /
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 20
smokeTest:
  enabled: true
  image: curlimages/curl:8.11.1
  retryCount: 10
  retryDelaySeconds: 3
  timeoutSeconds: 5
