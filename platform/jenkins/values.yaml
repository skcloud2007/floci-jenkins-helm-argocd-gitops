controller:
  admin:
    username: admin
    password: admin123

  serviceType: ClusterIP

  ingress:
    enabled: true
    apiVersion: networking.k8s.io/v1
    ingressClassName: nginx
    hostName: jenkins.127.0.0.1.nip.io
    path: /
    pathType: Prefix

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - credentials
    - credentials-binding
    - pipeline-stage-view
    - blueocean
    - docker-workflow

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  JCasC:
    defaultConfig: true

agent:
  enabled: true
